# ============================================================================
# InhibiForge — docker-compose (Stage 1: v3.0)
#   기본 서비스 'inhibiforge'는 통합 이미지(inhibiforge-full:v3.0)를 UI 모드로 띄움.
#   CLI 모드로 돌리려면:
#     docker compose run --rm inhibiforge-cli rfdiff --name my_job --contigs "100" ...
# ============================================================================
services:
  # ── UI 모드 (기본): http://localhost:8501 ────────────────────────────────
  inhibiforge:
    image: inhibiforge-full:v3.0
    container_name: inhibiforge-ui
    # NOTE: 본 compose 의 UI 서비스는 RAPID Lab 통합 스택(상위 docker-compose.yml,
    # 포트 8505) 이 도입된 이후로는 **사용하지 않는다**. Docker Desktop 재시작
    # 시 `restart: unless-stopped` 로 부활해 호스트 8501 을 점유하고 메인 스택
    # 과 충돌하므로 제거. CLI 전용으로 쓰려면 `--profile cli` 의 inhibiforge-cli
    # 서비스만 사용할 것.
    # Docker 기본 /dev/shm=64MB 는 AF2-multimer(binder protocol)에 부족하여
    # CUDA graph kernel add 가 INVALID_VALUE 로 실패함. 호스트와 동일 수준으로 확장.
    shm_size: "16gb"
    env_file:
      - ./config/.env.aws
    environment:
      RUN_MODE: ui
      TZ: Asia/Seoul
      # INHIBIFORGE_PROJECTS_DIR 은 이미지 기본값(/projects) 사용
    ports:
      - "8501:8501"
    volumes:
      - /home/sooyeon/amr/RFdiffusion:/mnt/ebs/rfdiffusion
      - ./test_data/input:/data/input
      - ./test_data/outputs:/data/output
      # Stage 1 — Projects 결과물 영속화 (호스트 Projects 디렉토리 공유)
      - /home/sooyeon/amr/LightdockDockQ/InhibiForge_app/Projects:/projects
      # DNAWorks 바이너리 (호스트 Fortran 빌드) — LightDock 후 DNA codon 최적화 단계에 필수
      - /home/sooyeon/amr/DNAWorks:/mnt/ebs/dnaworks:ro
      # ChimeraX: 호스트 apt 패키지 ucsf-chimerax-daily 마운트 (split_complex 단계에서 필수)
      #   호스트에 `sudo apt install ucsf-chimerax-daily` 필요. 실행 가능한 symlink
      #   `/usr/bin/chimerax-daily` 는 entrypoint.sh 가 컨테이너 내부에서 생성.
      #   (단일 파일을 bind-mount 하면 Docker 가 심볼릭 링크를 dereferencing 해서
      #    ELF 의 $ORIGIN 이 /usr/bin 으로 잘못 풀리고 libpython3.11 로딩 실패함.)
      - /usr/lib/ucsf-chimerax-daily:/usr/lib/ucsf-chimerax-daily:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── CLI 모드: 같은 이미지를 RUN_MODE=cli 로 일회성 실행 ─────────────────
  inhibiforge-cli:
    image: inhibiforge-full:v3.0
    profiles: ["cli"]            # 일반 `up` 시 자동 기동되지 않음
    shm_size: "16gb"             # AF2-multimer 용 (UI 서비스와 동일 이유)
    env_file:
      - ./config/.env.aws
    environment:
      RUN_MODE: cli
      TZ: Asia/Seoul
    volumes:
      - /home/sooyeon/amr/RFdiffusion:/mnt/ebs/rfdiffusion
      - ./test_data/input:/data/input
      - ./test_data/outputs:/data/output
      - /home/sooyeon/amr/LightdockDockQ/InhibiForge_app/Projects:/projects
      - /home/sooyeon/amr/DNAWorks:/mnt/ebs/dnaworks:ro
      # ChimeraX (CLI 에서도 split_complex 를 쓴다면 UI 와 동일하게 마운트 필요)
      # - /usr/lib/ucsf-chimerax-daily:/usr/lib/ucsf-chimerax-daily:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
