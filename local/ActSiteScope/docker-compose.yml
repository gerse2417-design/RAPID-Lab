version: '3.8'

services:
  actsitescope-studio:
    build: 
      context: .
      dockerfile: Dockerfile
    image: actsitescope-cli:v1.1
    container_name: actsitescope_studio
    ports:
      - "8501:8501"
    environment:
      - RUN_MODE=ui
      # Ensure GPU access inside compose
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./inputs:/app/inputs
      - ./results:/app/results
      - ./config:/app/config
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
